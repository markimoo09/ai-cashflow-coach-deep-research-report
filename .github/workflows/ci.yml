name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Resolve SPM dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project CashflowCoach.xcodeproj \
            -scheme CashflowCoach

      - name: Build (Debug)
        run: |
          xcodebuild build \
            -project CashflowCoach.xcodeproj \
            -scheme CashflowCoach \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -parallelizeTargets \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
              -project CashflowCoach.xcodeproj \
              -scheme CashflowCoach \
              -configuration Debug \
              -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
              CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project CashflowCoach.xcodeproj \
            -scheme CashflowCoach \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath TestResults.xcresult \
            | xcpretty || true

      - name: Lint (SwiftLint)
        run: |
          if which swiftlint >/dev/null; then
            swiftlint lint --strict
          else
            echo "SwiftLint not installed — skipping (install via: brew install swiftlint)"
          fi

  release:
    name: Release Placeholder
    runs-on: macos-15
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Archive placeholder
        run: echo "TODO: configure Fastlane / xcodebuild archive for App Store distribution"
